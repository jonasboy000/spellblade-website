<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="world.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <title>Spellblade - The World</title>
  </head>
  <body>
    <div class="wrap">
      <header>
        <a href="index.html"><img src="Spellblade-Logo.png" alt="logo" /></a>
        <nav>
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="world.html">The Worlds of Spellblade</a></li>
          </ul>
        </nav>
      </header>

      <div id="map-box">
        <button id="fs-btn" title="Fullscreen">⛶</button>
        <div id="map"></div>
      </div>

      <div id="info-overlay">
        <div id="info">
          <button id="info-close">✕</button>
          <h3 id="info-name">—</h3>
          <p id="info-desc"></p>
          <div id="info-body"></div>
          <span id="info-coords"></span>
        </div>
      </div>

      <div id="controls">
        <label
          >Hex opacity
          <input type="range" id="hex-opacity" min="0" max="100" value="0"
        /></label>
        <label
          ><input type="checkbox" id="hex-toggle" checked /> Show hex
          grid</label
        >
        <label
          ><input type="checkbox" id="labels-toggle" checked /> Show
          labels</label
        >
        <span id="coords">lat: — lng: —</span>
      </div>

      <footer>@Empire Road games 2026 - all rights reserved</footer>
    </div>
    <script src="world.js"></script>
  </body>
</html>
